# 本模板所有内容必须严格基于用户确认的需求基准生成，禁止擅自超出范围、脑补内容，所有核心决策必须有用户确认依据。
version: 2
baseline_id: "{{INITIAL_BASELINE_ID}}"
scope:
  mode: "greenfield"
  focus: "example-module"
  baseline_source: "MISSION.md + specs/"
  change_control: "all requirement changes must go through /change-request"
  quality_tier: "standard"
  primary_spec: "specs/example.spec.md"
  confirmed_stack_decisions: "[如 Next.js + Node API + PostgreSQL + 正式鉴权]"
  target_runtime: "[如 PostgreSQL + 正式鉴权]"
  dev_fallback: "[如 sqlite + mock auth]"

required_special_reviews: []

gates:
  - id: design-confirmation
    title: "设计确认门"
    status: pending
    checks:
      - "MISSION.md 已是本轮最新且已确认的需求基准"
      - "acceptance.yaml / tasks.yaml / Mission 的 baseline_id 一致"
      - "关键页面、信息架构和关键交互已确认"
      - "关键视觉方向和不采用的风格已写清"
      - "关键技术栈、目标运行态和不可逆关键选型已确认，未确认项已显式暴露"
      - "需要保真的页面已标记对照证据来源"
    evidence:
      - "design-decision-log"
      - "ia-map"
      - "screen-reference"

  - id: logic-confirmation
    title: "逻辑确认门"
    status: pending
    checks:
      - "核心接口、状态流转和业务规则已确认"
      - "关键异常路径和边界条件已确认"
      - "baseline-log/ 已留下本轮基线确认记录文件"
      - "spec 与 Mission / Design 没有冲突"
      - "需求点、任务和验收标准已建立一一对应关系"
    evidence:
      - "spec-review"
      - "contract-note"
      - "state-flow-note"

  - id: implementation-quality
    title: "实现质量门"
    status: pending
    checks:
      - "核心实现完成"
      - "关键用户任务 / 操作员任务所需的能力入口与执行链路真实可用，不是静态占位"
      - "未实现、未验证或仅 demo / placeholder 的能力未被标记为完成"
      - "契约基准、字段映射和状态枚举与实现一致"
      - "shared layer / 通用抽象改动已留下副作用影响清单"
      - "路由 / entrypoint、wrapper / adapter、实体 / schema parity 已核对"
      - "修改边界符合确认方案，没有越界改动"
      - "项目原生静态校验已完成（compile / type-check / build 其一）"
      - "测试与 review 已通过"
      - "没有已知严重回归"
    evidence:
      - "build-log"
      - "test-log"
      - "static-validation-check"
      - "task-flow-check"
      - "review-report"
      - "contract-baseline-check"
      - "shared-impact-check"
      - "route-contract-check"
      - "schema-parity-check"

  - id: delivery-readiness
    title: "交付质量门"
    status: pending
    checks:
      - "运行态验证已完成"
      - "关键用户任务或运营任务已完成适用的自动验证 / 人工验证 / UAT 组合"
      - "关键任务至少有一条异常 / 空数据 / 权限拒绝 / 超时 / 部分失败路径证据"
      - "UAT 或人工验证结果已记录"
      - "交付说明、回滚和移交信息齐全"
      - "交付说明已明确本次实现范围与未纳入范围项"
      - "交付说明已区分 AI 已完成 与 需人工执行，未把待人工执行动作写成已完成"
      - "交付说明已拆分代码状态 / 数据状态 / 运行状态"
      - "fallback 证据未被误当成正式交付证据"
    evidence:
      - "runtime-check"
      - "uat-result"
      - "manual-action-note"
      - "state-triage-note"
      - "handoff-note"
      - "rollback-note"
      - "degraded-path-check"

  - id: parity-gate
    title: "对照一致性门"
    status: not_applicable
    checks:
      - "reverse-spec 项目已给出关键页面、关键 API 或关键流程对照证据"
      - "允许改写的差异已在 DESIGN 或 spec 中显式说明"
    evidence:
      - "screenshot-compare"
      - "api-compare"
      - "behavior-note"

result:
  design_locked: blocked
  logic_locked: blocked
  implementation_ready: blocked
  delivery_ready: blocked
  blockers: []
  advisories: []
  user_confirmation_blockers: []
