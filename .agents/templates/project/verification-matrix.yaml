# 本模板所有内容必须严格基于用户确认的需求基准生成，禁止擅自超出范围、脑补内容，所有核心决策必须有用户确认依据。
version: 1

commands:
  validate: "create-ai-os doctor . --strict"
  verify: "[项目测试命令，例如 npm test / go test ./...]"
  build: "[项目构建或静态校验命令，例如 npm run build / npm run type-check / go build ./... / mvn compile]"
  restart_api: "[受影响 API 服务重启命令]"
  cold-start-smoke_api: "[API 服务冷启动后 Smoke Check 命令]"
  restart_worker: "[受影响 worker / cron / consumer 重启命令]"

rules:
  - id: runtime-config
    paths:
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - ".env"
      - ".env.*"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
    affected_components:
      - "runtime"
    actions:
      - "build"
      - "restart_api"
      - "cold-start-smoke_api"
    notes: "配置、依赖或运行环境变更后，不能只依赖热更新验证；若仍需人工重启或补环境变量，要在 release-plan 中显式列出"

  - id: api-code
    paths:
      - "src/api/**"
      - "internal/api/**"
    affected_components:
      - "api"
    actions:
      - "verify"
      - "build"
      - "restart_api"
      - "cold-start-smoke_api"
    notes: "服务端接口或启动链路变更后，要求冷启动 Smoke，并保留至少一项项目原生静态校验证据"

  - id: shared-runtime-code
    paths:
      - "src/shared/**"
      - "internal/shared/**"
      - "pkg/**"
    affected_components:
      - "api"
      - "worker"
    actions:
      - "verify"
      - "build"
      - "restart_api"
      - "restart_worker"
    notes: "共享运行时代码变更后，必须验证所有依赖方；若命中共享包装层 / 转换层，需在 DESIGN 或 review 中留下基础设施约定记录"

  - id: worker-code
    paths:
      - "src/worker/**"
      - "internal/worker/**"
      - "src/jobs/**"
      - "internal/jobs/**"
    affected_components:
      - "worker"
    actions:
      - "verify"
      - "build"
      - "restart_worker"
    notes: "worker、cron、queue consumer 变更后需要重新拉起后台进程；若重启需人工执行，要在交付说明中列为 `需人工执行`"

impact_rules:
  - id: linkage-entry
    impact_tags:
      - "entrypoint"
      - "transport"
      - "gateway"
      - "auth"
    actions:
      - "verify"
      - "build"
    evidence:
      - "contract-baseline-check"
      - "task-flow-check"
    notes: "入口、传输、网关和鉴权联动变更时，必须补齐可达性、契约证据以及共享 request wrapper / interceptor 影响核对"

  - id: linkage-data
    impact_tags:
      - "schema"
      - "mapping"
      - "storage"
      - "state-transition"
    actions:
      - "verify"
      - "build"
    evidence:
      - "contract-baseline-check"
      - "degraded-path-check"
    notes: "数据、映射和状态流转变更时，必须验证兼容性、异常路径、DTO / adapter 影响和持久化影响"

  - id: linkage-runtime
    impact_tags:
      - "runtime-config"
      - "external-dependency"
      - "async-processing"
    actions:
      - "build"
      - "restart_api"
      - "cold-start-smoke_api"
    evidence:
      - "runtime-check"
      - "degraded-path-check"
    notes: "运行时配置、外部依赖和异步处理变更后，必须验证目标运行态、静态校验入口和异常恢复路径"

failure_modes:
  - id: "[稳定 failure mode 标识，例如 missing-auth-context]"
    trigger: "[最小复现条件，例如 token 缺失时访问鉴权 API]"
    guards:
      - "[需要执行的验证动作，优先引用 acceptance.yaml 中已声明的 evidence，例如 degraded-path-check]"
      - "[需要回看的项目级工件，例如 evals/auth-context-missing.md]"
    notes: "当 debug / verify / postmortem 暴露出稳定 failure mode 或高频回归入口时，把最小复现、放行条件和验证方法沉淀到这里；high-risk 交付不能只保留空 failure_modes:"
