# 本模板所有内容必须严格基于用户确认的需求基准生成，禁止擅自超出范围、脑补内容，所有核心决策必须有用户确认依据。
version: 3
baseline_id: "{{INITIAL_BASELINE_ID}}"
scope:
  mode: "greenfield"
  focus: "example-module"
  baseline_source: "MISSION.md + specs/"
  quality_tier: "standard"

milestones:
  - id: M1
    title: "Design Locked"
    goal: "关键设计与逻辑已确认"
    scope: "[本里程碑覆盖范围]"
    acceptance_goal: "[本里程碑通过标准]"
    target_window: "[计划时间窗口]"
  - id: M2
    title: "Built and Verified"
    goal: "实现、验证和交付证据已就绪"
    scope: "[本里程碑覆盖范围]"
    acceptance_goal: "[本里程碑通过标准]"
    target_window: "[计划时间窗口]"

tasks:
  - id: TASK-AI-001
    title: "将关键页面、流程与接口契约收敛到 spec"
    milestone: M1
    parent: null
    status: todo
    owner: AI
    risk: medium
    priority: P1
    wave: 1
    execution_role: "design_mapper"
    approval_required: "user_confirms_plan"
    depends_on: []
    requirement_refs:
      - "REQ-001"
    acceptance_refs:
      - "AC-001"
    context_files:
      - "MISSION.md"
      - "DESIGN.md"
      - "STATE.md"
    inputs:
      - "MISSION.md"
      - "DESIGN.md"
      - "specs/example.spec.md"
    outputs:
      - "specs/example.spec.md"
      - "acceptance.yaml"
    affected_components:
      - "design"
      - "contracts"
    verification_required:
      - "validate"
    restart_required: false
    cold_start_required: false
    measurable_outcome:
      - "[用可验证的具体条件替代形容词，例如：所有关键页面的 IA 层级和导航路径已在 spec 中逐一列出]"
    edge_cases:
      - "[列出本任务最可能遗漏的异常路径，例如：空数据状态下的页面展示、权限不足时的流程中断]"
    definition_of_ready:
      - "Mission 已明确用户、目标和项目模式"
      - "baseline_id 与最新确认基线一致"
      - "关键输入素材已整理"
      - "核心待确认项已显式暴露"
    definition_of_done:
      - "关键页面与流程已进入 spec"
      - "关键技术栈与关键选型已记录，并区分已确认与待确认项"
      - "设计确认门和逻辑确认门具备通过条件"
      - "需求点、任务和验收标准建立了映射"
      - "measurable_outcome 中列出的条件全部满足"
      - "edge_cases 中列出的异常路径已在 spec 或任务拆解中体现"
    acceptance_criteria:
      - "AC-001"
    evidence_required:
      - "design-decision-log"
      - "flow-note"
      - "spec-update"
    parity_evidence_required: []
    impact_tags:
      - "entrypoint"
      - "schema"
    derived_checks:
      - "load contract baseline before task split"
      - "derive context_files from integration touchpoints"
      - "verify requirement-to-acceptance traceability"
    parity_checks:
      - "shared-side-effects"
      - "route-contract"
      - "schema-consistency"
    similar_impl_refs:
      - "[同仓一个已工作的同类实现路径或模块]"
    step_validation:
      - "[每完成一个高风险或跨层 slice 就执行的最小验证，例如：模块 compile / 定向测试 / 单页 smoke]"
    risk_triggers: []
    blockers: []
    change_scope:
      - "specs/example.spec.md"
      - "acceptance.yaml"
    out_of_scope_guard:
      - "不进入未确认的实现工作"
    notes: ""

  - id: TASK-AI-002
    title: "按已锁定设计和契约完成实现"
    milestone: M2
    parent: null
    status: todo
    owner: AI
    risk: medium
    priority: P0
    wave: 2
    execution_role: "implementer"
    approval_required: "before_execution"
    depends_on:
      - "TASK-AI-001"
    requirement_refs:
      - "REQ-001"
    acceptance_refs:
      - "AC-001"
    context_files:
      - "MISSION.md"
      - "DESIGN.md"
      - "STATE.md"
      - "specs/example.spec.md"
      - "acceptance.yaml"
    inputs:
      - "MISSION.md"
      - "DESIGN.md"
      - "specs/example.spec.md"
      - "acceptance.yaml"
    outputs:
      - "src/example.ts"
      - "tests/example.test.ts"
    affected_components:
      - "app"
    verification_required:
      - "validate"
      - "build"
    restart_required: false
    cold_start_required: false
    measurable_outcome:
      - "[用可验证的具体条件替代形容词，例如：核心 CRUD 流程 happy path + 3 条 degraded path 全部通过自动化测试]"
    edge_cases:
      - "[列出本任务必须覆盖的异常路径，例如：空列表、网络超时、并发冲突、权限拒绝、部分失败回滚]"
    definition_of_ready:
      - "设计确认门已通过"
      - "逻辑确认门已通过"
      - "baseline_id 与 Mission 当前基线 ID 一致"
      - "不存在阻塞性的技术选型待确认项"
      - "不存在阻塞性待确认项"
      - "用户已确认本轮任务边界和验收标准"
    definition_of_done:
      - "实现与测试完成"
      - "关键用户任务 / 运营任务验证完成，不存在仅占位能力"
      - "实现质量门可通过"
      - "交付质量门所需证据已补齐"
      - "只修改了已确认范围内的代码"
      - "measurable_outcome 中列出的条件全部通过"
      - "edge_cases 中列出的异常路径全部有验证结论"
    acceptance_criteria:
      - "AC-001"
    evidence_required:
      - "build-log"
      - "test-log"
      - "review-note"
      - "task-flow-check"
      - "runtime-check"
    parity_evidence_required:
      - "screenshot-or-api-compare"
    impact_tags:
      - "entrypoint"
      - "transport"
      - "mapping"
    derived_checks:
      - "check linkage for all declared integration touchpoints"
      - "compare implementation against contract baseline"
      - "collect degraded-path evidence for key tasks"
      - "confirm no out-of-scope edits were introduced"
    parity_checks:
      - "shared-side-effects"
      - "route-contract"
      - "schema-consistency"
    similar_impl_refs:
      - "[同仓一个已工作的同类实现路径或模块]"
    step_validation:
      - "[先跑最小 compile / type-check / 定向测试，再继续下一处改动]"
    risk_triggers: []
    blockers: []
    change_scope:
      - "src/example.ts"
      - "tests/example.test.ts"
    out_of_scope_guard:
      - "禁止顺手优化、重构或修改无关逻辑"
    notes: ""
