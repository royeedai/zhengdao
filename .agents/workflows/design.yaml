version: "1"
phase: design
name: 设计锁定
description: 锁定关键信息架构、页面、交互、视觉方向和关键流程

entry_gates:
  - id: mission-exists
    check: file_exists
    path: MISSION.md
    severity: error
    message: "MISSION.md 不存在，需先完成 /align"

  - id: baseline-log-has-records
    check: dir_not_empty
    path: baseline-log
    severity: error
    message: "baseline-log/ 为空，需先完成 /align"

exit_gates:
  - id: design-exists
    check: file_exists
    path: DESIGN.md
    severity: error
    message: "DESIGN.md 不存在"

  - id: design-has-content
    check: file_min_lines
    path: DESIGN.md
    min_lines: 10
    severity: error
    message: "DESIGN.md 内容过少（少于 10 行），设计未充分展开"

  - id: state-exists
    check: file_exists
    path: STATE.md
    severity: error
    message: "STATE.md 不存在"

artifacts:
  required:
    - DESIGN.md
  optional:
    - design-pack/parity-map.md

transitions:
  default: plan
