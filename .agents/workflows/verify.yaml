version: "1"
phase: verify
name: 验证
description: 做设计、逻辑、工程质量和运行态验证

entry_gates:
  - id: tasks-exists
    check: file_exists
    path: tasks.yaml
    severity: error
    message: "tasks.yaml 不存在"

  - id: acceptance-exists
    check: file_exists
    path: acceptance.yaml
    severity: error
    message: "acceptance.yaml 不存在"

exit_gates:
  - id: acceptance-all-passed
    check: acceptance_all_passed
    severity: error
    message: "仍有未通过的验收项"

  - id: state-exists
    check: file_exists
    path: STATE.md
    severity: error
    message: "STATE.md 不存在"

  - id: failure-modes-documented
    check: yaml_top_level_list_has_entries
    path: verification-matrix.yaml
    key: failure_modes
    if_exists_only: true
    severity: warning
    message: "verification-matrix.yaml 已存在但 failure_modes 缺失或为空（建议补充稳定 guard）"

  - id: failure-mode-guards-traceable
    check: failure_mode_guards_valid
    path: verification-matrix.yaml
    acceptance_path: acceptance.yaml
    if_exists_only: true
    severity: warning
    message: "verification-matrix.yaml 的 failure_modes guards 未对齐 acceptance evidence 或现有 eval"

artifacts:
  required:
    - acceptance.yaml
    - STATE.md

transitions:
  default: ship
  alternatives:
    - target: debug
      when: "发现 bug 需定界修复"
    - target: change-request
      when: "发现需求需要变更"
