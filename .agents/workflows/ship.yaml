version: "1"
phase: ship
name: 交付
description: 做交付、发布、回滚和移交

entry_gates:
  - id: acceptance-exists
    check: file_exists
    path: acceptance.yaml
    severity: error
    message: "acceptance.yaml 不存在"

exit_gates:
  - id: release-plan-exists
    check: file_exists
    path: release-plan.md
    severity: warning
    message: "release-plan.md 不存在（建议补充发布计划）"

artifacts:
  required: []
  optional:
    - release-plan.md

transitions:
  default: done
