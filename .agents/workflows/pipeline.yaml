version: "1"
name: ai-os-pipeline
description: AI-OS delivery pipeline — phase order and transition rules

phases:
  - id: align
    name: 目标对齐
    workflow: align.yaml

  - id: design
    name: 设计锁定
    workflow: design.yaml
    requires:
      phases_completed: [align]

  - id: plan
    name: 任务拆解
    workflow: plan.yaml
    requires:
      phases_completed: [align, design]

  - id: build
    name: 实现
    workflow: build.yaml
    requires:
      phases_completed: [align, design, plan]

  - id: verify
    name: 验证
    workflow: verify.yaml
    requires:
      phases_completed: [build]

  - id: ship
    name: 交付
    workflow: ship.yaml
    requires:
      phases_completed: [verify]

shortcuts:
  p1:
    description: P1 变更快速路径
    entry: change-request
    phases: [plan, build, verify]
  p2:
    description: P2 轻量修复
    phases: [debug]
