version: "1"
phase: plan
name: 任务拆解
description: 生成 spec、任务波次、门禁和证据计划

entry_gates:
  - id: mission-exists
    check: file_exists
    path: MISSION.md
    severity: error
    message: "MISSION.md 不存在"

  - id: design-exists
    check: file_exists
    path: DESIGN.md
    severity: error
    message: "DESIGN.md 不存在，需先完成 /design"

exit_gates:
  - id: tasks-exists
    check: file_exists
    path: tasks.yaml
    severity: error
    message: "tasks.yaml 不存在"

  - id: acceptance-exists
    check: file_exists
    path: acceptance.yaml
    severity: error
    message: "acceptance.yaml 不存在"

  - id: specs-dir-not-empty
    check: dir_not_empty
    path: specs
    severity: warning
    message: "specs/ 为空（建议补充 spec 文件）"

  - id: tasks-has-entries
    check: yaml_has_entries
    path: tasks.yaml
    severity: error
    message: "tasks.yaml 中没有任务定义"

artifacts:
  required:
    - tasks.yaml
    - acceptance.yaml
  optional:
    - specs/

transitions:
  default: build
