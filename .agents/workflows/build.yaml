version: "1"
phase: build
name: 实现
description: 在设计门和逻辑门通过后按 wave 实现

entry_gates:
  - id: mission-exists
    check: file_exists
    path: MISSION.md
    severity: error
    message: "MISSION.md 不存在"

  - id: design-exists
    check: file_exists
    path: DESIGN.md
    severity: error
    message: "DESIGN.md 不存在，需先完成 /design"

  - id: tasks-exists
    check: file_exists
    path: tasks.yaml
    severity: error
    message: "tasks.yaml 不存在，需先完成 /plan"

  - id: acceptance-exists
    check: file_exists
    path: acceptance.yaml
    severity: error
    message: "acceptance.yaml 不存在，需先完成 /plan"

exit_gates:
  - id: tasks-all-completed
    check: tasks_all_completed
    severity: error
    message: "仍有未完成的任务"

  - id: state-exists
    check: file_exists
    path: STATE.md
    severity: error
    message: "STATE.md 不存在"

artifacts:
  required:
    - tasks.yaml
    - acceptance.yaml
    - STATE.md

transitions:
  default: verify
