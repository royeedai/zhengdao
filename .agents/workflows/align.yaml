version: "1"
phase: align
name: 目标对齐
description: 澄清目标、用户、范围、项目模式、质量标准和待确认项

entry_gates: []

exit_gates:
  - id: mission-exists
    check: file_exists
    path: MISSION.md
    severity: error
    message: "MISSION.md 不存在，无法进入下一阶段"

  - id: mission-has-goal
    check: field_not_placeholder
    path: MISSION.md
    section: "交付基线摘要"
    field: "当前交付目标"
    severity: error
    message: "当前 lane 的交付目标未填写"

  - id: mission-has-success-criteria
    check: field_not_placeholder
    path: MISSION.md
    section: "交付基线摘要"
    field: "成功标准"
    severity: error
    message: "成功标准未填写"

  - id: mission-has-scope
    check: section_not_empty
    path: MISSION.md
    section: "范围边界与非目标"
    severity: warning
    message: "范围边界部分为空（建议补充）"

  - id: baseline-log-has-records
    check: dir_not_empty
    path: baseline-log
    severity: error
    message: "baseline-log/ 为空，至少需要一条基线记录"

  - id: state-exists
    check: file_exists
    path: STATE.md
    severity: error
    message: "STATE.md 不存在"

artifacts:
  required:
    - MISSION.md
    - baseline-log/
    - STATE.md

transitions:
  default: design
  alternatives:
    - target: change-request
      when: "需求变更时"
