impact_rules:
  - when: "ai-os-framework-upgrade"
    run:
      - "node /tmp/ai-os-v9-inspect-20260422/bin/create-ai-os.js doctor . --json"
      - "lane artifact completeness check"
      - "git diff --check"
      - "npm run build"
  - when: "desktop-shell-change"
    run:
      - "npm test"
      - "npm run build"
      - "Windows package smoke or explicit manual blocker"
  - when: "v1.2.4-release-local-changes"
    run:
      - "npm test"
      - "npm run build"
      - "git diff --check"
      - "GitHub Release body and asset check"
  - when: "system-settings-ia-change"
    run:
      - "npm test"
      - "npm run build"
      - "code review: AppSettings appearance/account/update tabs"
      - "code review: TopBar has no theme/account settings menu"
      - "code review: AI global accounts are under AppSettings"
  - when: "windows-tray-icon-fix"
    run:
      - "npm test -- src/shared/__tests__/desktop-tray.test.ts src/shared/__tests__/window-shell.test.ts"
      - "npm run build"
      - "Windows real-device tray visibility check or explicit manual blocker"
  - when: "windows-installer-upgrade-fix"
    run:
      - "npm test -- scripts/release/electron-builder-config.test.ts"
      - "npm run build"
      - "git diff --check"
      - "Windows real-device uninstall / overwrite install smoke or explicit manual blocker"
  - when: "macos-manual-installer-download"
    run:
      - "npm test -- src/shared/__tests__/update.test.ts src/renderer/src/utils/__tests__/update-prompt.test.ts src/renderer/src/components/modals/__tests__/AppSettingsModal.test.tsx"
      - "npm run typecheck"
      - "macOS packaged-app download/open DMG smoke or explicit manual blocker"

failure_modes:
  - id: FM-DEF-001
    scenario: "AI-OS v9 migration leaves non-default lanes in old acceptance.yaml-only shape"
    expected: "Every existing lane has v9 DESIGN, risk-register, release-plan, verification-matrix, design-pack and evals"
    guard: ".ai-os/lanes/* artifact completeness check"
  - id: FM-DEF-002
    scenario: "AI-OS upgrade accidentally touches business source files"
    expected: "Only AI-OS framework artifacts and IDE pointers change in this task"
    guard: "git status --short with path review"
  - id: FM-DEF-003
    scenario: "Windows shell appears complete in code but still needs runtime visual verification"
    expected: "Ship notes separate code state from Windows real-device visual state"
    guard: ".ai-os/lanes/default/STATE.md pending manual Windows validation"
  - id: FM-DEF-004
    scenario: "Relation graph canvas height feeds back into ResizeObserver and makes character labels drift downward"
    expected: "Graph container has stable layout height and canvas resizing cannot change the measured container height"
    guard: "npm run build plus RelationGraph sizing code review"
  - id: FM-DEF-005
    scenario: "A new release is tagged before the large dirty worktree is grouped, documented, and validated"
    expected: "v1.2.4 has a baseline CR, changelog, risk entry, release plan, tests, build, and final release verification"
    guard: ".ai-os/lanes/default/baseline-log/CR-20260423-001100-v1.2.4-release-local-changes.md plus npm test/build logs"
  - id: FM-DEF-006
    scenario: "GitHub Release contains assets but no changelog or release notes"
    expected: "Release body contains changelog, package list, update metadata, notes, validation state, and rollback guidance"
    guard: "scripts/release/update-github-release-notes.mjs plus remote Release body check"
  - id: FM-DEF-007
    scenario: "Theme mode is persisted as system but renderer writes data-theme='system'"
    expected: "Document data-theme always receives the resolved light/dark theme while data-theme-mode stores the user choice"
    guard: "src/renderer/src/App.tsx review plus npm run build"
  - id: FM-DEF-008
    scenario: "Update auto-open lands on appearance settings instead of update status"
    expected: "Updater opens AppSettings with the updates tab selected"
    guard: "UpdateBootstrap opens appSettings with tab=updates"
  - id: FM-DEF-009
    scenario: "Removing titlebar account menu makes Google login unreachable"
    expected: "AppSettings account tab supports login, logout, sync toggle, manual upload and cloud list refresh"
    guard: "AppSettings account tab review plus npm run build"
  - id: FM-DEF-010
    scenario: "AI global account management remains hidden inside project-level AI configuration"
    expected: "AppSettings has an AI global account tab, while AiSettings keeps only project profile and skills"
    guard: "AppSettings / AiSettings tab review plus npm run build"
  - id: FM-DEF-011
    scenario: "AI global account status detection ignores the current draft token or the saved account secret and always reports API Key / Token missing"
    expected: "Status checks forward the draft provider config and saved account id so unsaved drafts and persisted accounts can both be probed correctly"
    guard: "src/renderer/src/utils/ai/__tests__/global-account-status.test.ts plus npm run build"
  - id: FM-DEF-012
    scenario: "Windows installer has icon resources but the running app never creates a system tray icon"
    expected: "Windows runtime creates an Electron Tray, close hides the main window to tray, and the tray menu has a clear quit action"
    guard: "src/shared/__tests__/desktop-tray.test.ts plus npm run build"
  - id: FM-DEF-013
    scenario: "Windows overwrite install is allowed to pick a different directory, leaving shortcuts or pinned entries opening the old version"
    expected: "NSIS assisted installer cannot change the installation directory and keeps shortcuts bound to the upgraded installation"
    guard: "scripts/release/electron-builder-config.test.ts plus Windows overwrite install smoke"
  - id: FM-DEF-014
    scenario: "Uninstall recovery deletes user writing data while repairing a broken NSIS uninstaller"
    expected: "Uninstall configuration and recovery docs explicitly preserve userData and zhengdao.db"
    guard: "scripts/release/electron-builder-config.test.ts plus RELEASING.md recovery checklist"
  - id: FM-DEF-015
    scenario: "Application Settings overview references an icon component that was not imported and crashes during unauthenticated account loading"
    expected: "Application Settings can render its overview while the account state is loading"
    guard: "src/renderer/src/components/modals/__tests__/AppSettingsModal.test.tsx plus npm run build"
  - id: FM-DEF-016
    scenario: "Unsigned macOS public builds only open the GitHub Release page, leaving users to manually find the matching DMG"
    expected: "The macOS manual-update action downloads the current-version DMG for the running architecture into Downloads and opens it, while automatic install remains blocked"
    guard: "src/shared/__tests__/update.test.ts plus src/renderer/src/components/modals/__tests__/AppSettingsModal.test.tsx plus packaged-app smoke"

guards:
  - ".ai-os/lanes/default/evals/ai-os-v9-lane-normalization.md"
  - ".ai-os/lanes/default/STATE.md"
