name: Bug Report
description: 报告一个可以复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量填写完整，这样更容易复现和定位问题。
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 例如 v1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - Windows x64
        - Windows ARM64
        - macOS Apple Silicon
        - macOS Intel
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 按 1、2、3 写清楚
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图 / 录屏
      description: 如有错误信息、控制台输出或截图，请贴在这里
