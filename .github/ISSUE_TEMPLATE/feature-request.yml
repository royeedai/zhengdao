name: Feature Request
description: 提交一个功能建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: 你当前遇到的具体问题是什么？
      placeholder: 先描述问题，再谈方案
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你希望怎样改进？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过哪些替代方案？
  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 场景、截图、参考产品都可以补充
