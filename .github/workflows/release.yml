name: release

on:
  repository_dispatch:
    types:
      - release
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v1.4.0'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install -g npm@10.9.8
      - run: npm ci --ignore-scripts
      - run: npm rebuild electron
      - run: npm rebuild better-sqlite3
      - run: npm test
      - run: npm run build
      - run: node scripts/release/rebuild-electron-native.mjs arm64
      - run: node scripts/release/verify-electron-native.mjs
      - run: npx electron-builder --config electron-builder.config.ts --mac dmg zip --publish always

  build-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install -g npm@10.9.8
      - run: npm ci --ignore-scripts
      - run: npm rebuild electron
      - run: npm rebuild better-sqlite3
      - run: npm test
      - run: npm run build
      - run: node scripts/release/rebuild-electron-native.mjs x64
      - run: node scripts/release/verify-electron-native.mjs
      - run: npx electron-builder --config electron-builder.config.ts --win nsis --x64 --publish always

  publish-release-notes:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.event.client_payload.release_tag || inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/release/update-github-release-notes.mjs
